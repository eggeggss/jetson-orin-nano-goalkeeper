services:
  face-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: face-app
    restart: unless-stopped
    privileged: true          # needed for /dev/video*, /dev/snd access
    stdin_open: true
    tty: true
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-4o-realtime-preview}
      - CAMERA_INDEX=${CAMERA_INDEX:-0}
      - FACE_CONFIDENCE_THRESHOLD=${FACE_CONFIDENCE_THRESHOLD:-0.45}
      - AUDIO_INPUT_DEVICE=${AUDIO_INPUT_DEVICE:--1}
      - AUDIO_OUTPUT_DEVICE=${AUDIO_OUTPUT_DEVICE:--1}
      - AUDIO_INPUT_DEVICE_NAME=${AUDIO_INPUT_DEVICE_NAME:-}
      - AUDIO_OUTPUT_DEVICE_NAME=${AUDIO_OUTPUT_DEVICE_NAME:-}
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CONVERSATION_MAX_SECONDS=${CONVERSATION_MAX_SECONDS:-120}
      - COOLDOWN_SECONDS=${COOLDOWN_SECONDS:-30}
      - FACE_DETECTION_INTERVAL_MS=${FACE_DETECTION_INTERVAL_MS:-500}
    volumes:
      - ./data:/app/data
      - ./models:/app/models   # persist InsightFace model downloads
    ports:
      - "8000:8000"
    # To enable NVIDIA GPU (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
